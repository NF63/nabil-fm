  <rect x="60" y="102" width="6" height="16" rx="3" />
  <!-- windows -->
  <rect x="60" y="60" width="6" height="6" rx="0.5" />
  <rect x="60" y="74" width="6" height="6" rx="0.5" />
  <rect x="60" y="88" width="6" height="6" rx="0.5" />

  <!-- House 4 - wide with spout gable -->
  <path d="M72 118 L72 42 L74 42 L78 32 L82 42 L84 42 L84 118" />
