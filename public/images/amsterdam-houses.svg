  <!-- door -->
  <rect x="108" y="102" width="5" height="16" rx="2.5" />
  <!-- windows -->
  <rect x="108" y="62" width="4" height="6" rx="0.5" />
  <rect x="108" y="76" width="4" height="6" rx="0.5" />
  <rect x="108" y="90" width="4" height="6" rx="0.5" />

  <!-- House 7 - step gable again, taller -->
