  <rect x="75" y="100" width="7" height="18" rx="3.5" />
  <!-- windows -->
  <rect x="74" y="52" width="5" height="7" rx="0.5" />
  <rect x="74" y="67" width="5" height="7" rx="0.5" />
  <rect x="74" y="82" width="5" height="7" rx="0.5" />
  <!-- hook beam -->
  <line x1="78" y1="35" x2="78" y2="29" />
  <line x1="76" y1="29" x2="80" y2="29" />

  <!-- House 5 - tall with clock gable -->
  <path d="M88 118 L88 40 L91 36 L95 33 L99 36 L102 40 L102 118" />
