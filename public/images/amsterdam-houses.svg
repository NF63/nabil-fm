  <circle cx="95" cy="38" r="2" />
  <!-- door -->
  <rect x="92" y="100" width="7" height="18" rx="3.5" />
  <!-- windows -->
  <rect x="91" y="50" width="5" height="7" rx="0.5" />
  <rect x="91" y="65" width="5" height="7" rx="0.5" />
  <rect x="91" y="82" width="5" height="7" rx="0.5" />

