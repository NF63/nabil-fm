  <rect x="129" y="48" width="5" height="7" rx="0.5" />
  <rect x="121" y="63" width="5" height="7" rx="0.5" />
  <rect x="129" y="63" width="5" height="7" rx="0.5" />
  <rect x="121" y="80" width="5" height="7" rx="0.5" />
  <rect x="129" y="80" width="5" height="7" rx="0.5" />
  <!-- hook beam -->
  <line x1="127" y1="28" x2="127" y2="22" />
  <line x1="125" y1="22" x2="129" y2="22" />

  <!-- Canal water hint - gentle wavy line -->
  <path d="M8 120 Q15 122 22 120 Q30 118 38 120 Q46 122 54 120 Q62 118 70 120 Q78 122 86 120 Q94 118 102 120 Q110 122 118 120 Q126 118 134 120 Q138 122 140 120" opacity="0.4" />
