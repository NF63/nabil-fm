  <!-- windows -->
  <rect x="39" y="58" width="5" height="7" rx="0.5" />
  <rect x="47" y="58" width="5" height="7" rx="0.5" />
  <rect x="39" y="73" width="5" height="7" rx="0.5" />
  <rect x="47" y="73" width="5" height="7" rx="0.5" />
  <rect x="39" y="87" width="5" height="7" rx="0.5" />
  <rect x="47" y="87" width="5" height="7" rx="0.5" />

  <!-- House 3 - narrow with neck gable -->
  <path d="M58 118 L58 52 L60 48 L63 42 L66 48 L68 52 L68 118" />
