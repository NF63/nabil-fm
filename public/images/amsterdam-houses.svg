<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
  <!-- House 1 - tall narrow with bell gable -->
  <path d="M12 118 L12 45 L17 38 L22 32 L27 38 L32 45 L32 118" />
  <line x1="12" y1="118" x2="32" y2="118" />
  <!-- door -->
  <rect x="18" y="98" width="8" height="20" rx="4" />
  <!-- windows -->
  <rect x="16" y="55" width="5" height="7" rx="0.5" />
  <rect x="24" y="55" width="5" height="7" rx="0.5" />
  <rect x="16" y="70" width="5" height="7" rx="0.5" />
  <rect x="24" y="70" width="5" height="7" rx="0.5" />
  <rect x="16" y="85" width="5" height="7" rx="0.5" />
  <rect x="24" y="85" width="5" height="7" rx="0.5" />
  <!-- hook beam -->
  <line x1="22" y1="35" x2="22" y2="30" />
  <line x1="20" y1="30" x2="24" y2="30" />

  <!-- House 2 - wider with step gable -->
  <path d="M36 118 L36 50 L38 50 L38 44 L41 44 L41 38 L45 35 L49 38 L49 44 L52 44 L52 50 L54 50 L54 118" />
